<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>-app</title>
    <script>
      (() => {
        const colors = {
          blue: ['59, 130, 246', '139, 92, 246'],
          purple: ['139, 92, 246', '236, 72, 153'],
          rose: ['236, 72, 153', '244, 63, 94'],
          coral: ['239, 68, 68', '249, 115, 22'],
          orange: ['249, 115, 22', '245, 158, 11'],
          amber: ['245, 158, 11', '234, 179, 8'],
          green: ['16, 185, 129', '20, 184, 166'],
          mint: ['52, 211, 153', '45, 212, 191'],
          teal: ['6, 182, 212', '59, 130, 246'],
          cyan: ['14, 165, 233', '6, 182, 212'],
          indigo: ['99, 102, 241', '139, 92, 246'],
          space: ['30, 41, 115', '79, 70, 229'],
        };
        const clamp = (value) => Math.min(255, Math.max(0, Number(value)));
        const shift = (tuple, amount) => tuple.split(',').map((part) => clamp(Number(part.trim()) + amount)).join(', ');
        const hexToTuple = (hex) => {
          const value = String(hex || '').trim().toUpperCase();
          if (!/^#[0-9A-F]{6}$/.test(value)) return null;
          return [
            parseInt(value.slice(1, 3), 16),
            parseInt(value.slice(3, 5), 16),
            parseInt(value.slice(5, 7), 16),
          ].join(', ');
        };
        try {
          const stored = localStorage.getItem('accent_color') || 'blue';
          let key = stored;
          let pair = colors[stored] || colors.blue;
          if (stored.startsWith('custom:')) {
            const primary = hexToTuple(stored.slice(7));
            if (primary) {
              key = 'custom';
              pair = [primary, shift(primary, 42)];
            }
          }
          const hover = shift(pair[0], -28);
          const root = document.documentElement;
          root.style.setProperty('--accent-color', `rgb(${pair[0]})`);
          root.style.setProperty('--accent-secondary', `rgb(${pair[1]})`);
          root.style.setProperty('--accent-rgb', pair[0]);
          root.style.setProperty('--accent-secondary-rgb', pair[1]);
          root.style.setProperty('--primary-hover', `rgb(${hover})`);
          root.style.setProperty('--primary-hover-rgb', hover);
          root.style.setProperty('--accent-gradient', `linear-gradient(135deg, rgb(${pair[0]}) 0%, rgb(${pair[1]}) 100%)`);
          root.style.setProperty('--focus-ring', `0 0 0 3px rgba(${pair[0]}, 0.3)`);
          root.style.setProperty('--bg-glow-1', `rgba(${pair[0]}, 0.15)`);
          root.style.setProperty('--bg-glow-2', `rgba(${pair[1]}, 0.15)`);
          root.dataset.accent = key;
        } catch {
          // Keep CSS defaults when localStorage is unavailable.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
